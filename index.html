<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="稼ぎカウンター">
  <meta name="theme-color" content="#ffffff">
  <title>稼ぎカウンター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-subtle: #fafafa;
      --line: #ececec;
      --line-subtle: #f4f4f4;
      --text: #0a0a0a;
      --text-dim: #6b6b6b;
      --text-quiet: #a3a3a3;
      --text-faint: #d4d4d4;

      --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Noto Sans JP', sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-feature-settings: "ss01" on, "cv11" on, "tnum" on;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-size: 15px;
      line-height: 1.5;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    main {
      max-width: 440px;
      margin: 0 auto;
      padding: 32px 28px 56px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 72px;
    }
    .brand {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.005em;
    }
    .brand-date {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-quiet);
      letter-spacing: 0.02em;
      margin-top: 2px;
    }
    .text-btn {
      background: none;
      border: none;
      padding: 6px 0 6px 12px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0;
      transition: color 0.15s;
    }
    .text-btn:active { color: var(--text); }

    /* ===== Setup View ===== */
    #setupView {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .setup-head h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .setup-head p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.65;
    }

    .field {
      display: flex;
      flex-direction: column;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }
    .field:first-of-type { border-top: 1px solid var(--line); }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .field label {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .field-input {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .field input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 18px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      padding: 0;
      outline: none;
      text-align: right;
      width: 110px;
      -webkit-appearance: none;
      letter-spacing: -0.01em;
    }
    .field input::placeholder {
      color: var(--text-faint);
    }
    .field-unit {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 400;
    }
    .field-hint {
      font-size: 12px;
      color: var(--text-quiet);
      margin-top: 8px;
    }

    /* ===== Main View ===== */
    #mainView {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ===== Counter Block ===== */
    .counter {
      margin-bottom: 56px;
    }
    .counter-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.01em;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background 0.2s;
    }
    .status-dot.active {
      background: var(--text);
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .status-text.active {
      color: var(--text);
      font-weight: 500;
    }

    .counter-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 14px;
      letter-spacing: 0;
    }
    .counter-amount {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.045em;
      margin-bottom: 36px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .counter-amount .unit {
      font-size: clamp(24px, 5.5vw, 32px);
      font-weight: 400;
      color: var(--text-quiet);
      letter-spacing: 0;
    }
    .counter-amount .number {
      font-size: clamp(84px, 26vw, 136px);
      transition: opacity 0.2s;
    }

    .counter-meta {
      display: flex;
      gap: 36px;
    }
    .counter-meta-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .counter-meta-label {
      font-size: 11px;
      color: var(--text-quiet);
      letter-spacing: 0.01em;
    }
    .counter-meta-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }

    /* ===== Trivia ===== */
    .counter-trivia {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      min-height: 54px;
      opacity: 1;
      transition: opacity 0.28s ease;
      letter-spacing: -0.004em;
    }
    .counter-trivia.fade { opacity: 0; }
    .counter-trivia:empty { display: none; }
    .counter-trivia .kind {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--bg);
      background: var(--text);
      padding: 3px 7px;
      border-radius: 3px;
      letter-spacing: 0.1em;
      margin-right: 10px;
      vertical-align: 2px;
      font-weight: 500;
    }
    .counter-trivia .num {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text);
    }
    .counter-trivia #triviaText {
      color: var(--text-dim);
    }

    /* ===== Buttons ===== */
    .actions {
      margin-top: 0;
    }
    .btn {
      width: 100%;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.005em;
      padding: 16px 20px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-primary:hover { background: #1a1a1a; border-color: #1a1a1a; }
    .btn-outline {
      background: var(--bg);
      color: var(--text);
      border-color: var(--text);
    }
    .btn-outline:hover { background: #0a0a0a0a; }
    .btn-ghost {
      background: var(--bg);
      color: var(--text-dim);
      border-color: var(--line);
    }

    /* ===== History ===== */
    .history {
      margin-top: 72px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 12px;
    }
    .history-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.005em;
    }
    .history-total {
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--line);
    }
    .history-item {
      display: grid;
      grid-template-columns: 48px 1fr auto 24px;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--line-subtle);
    }
    .history-item:last-child { border-bottom: 1px solid var(--line); }
    .history-date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }
    .history-duration {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-quiet);
      font-variant-numeric: tabular-nums;
    }
    .history-amount {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }
    .history-empty {
      padding: 28px 0;
      color: var(--text-quiet);
      font-size: 13px;
      border-bottom: 1px solid var(--line);
    }
    .history-delete {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 18px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      transition: color 0.15s;
      justify-self: end;
    }
    .history-delete:active { color: var(--text); }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.22);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 10;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 20px 28px calc(32px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.28s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-grab {
      width: 36px;
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .modal-rate {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--text-dim);
    }
    .modal-rate strong {
      color: var(--text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .modal-submit {
      margin-top: 24px;
    }

    /* ===== Utilities ===== */
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main>
    <header class="header">
      <div>
        <div class="brand">稼ぎカウンター</div>
        <div class="brand-date" id="brandDate"></div>
      </div>
      <button id="settingsBtn" class="text-btn" hidden aria-label="設定を開く">設定</button>
    </header>

    <!-- Setup View -->
    <section id="setupView" hidden>
      <div class="setup-head">
        <h1>はじめに</h1>
        <p>月給と稼働日数を設定すると、勤務中の稼ぎを秒ごとに表示します。あとから変更できます。</p>
      </div>

      <form class="setup-form" id="setupForm">
        <div class="field">
          <div class="field-row">
            <label for="setupSalary">月給</label>
            <div class="field-input">
              <input id="setupSalary" type="number" inputmode="numeric" placeholder="300,000" min="1" required>
              <span class="field-unit">円</span>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="setupDays">月の稼働日数</label>
            <div class="field-input">
              <input id="setupDays" type="number" inputmode="numeric" placeholder="20" min="1" max="31" required>
              <span class="field-unit">日</span>
            </div>
          </div>
          <div class="field-hint">1日8時間勤務として計算します。</div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:32px">はじめる</button>
      </form>
    </section>

    <!-- Main View -->
    <section id="mainView" hidden>
      <div class="counter">
        <div class="counter-status">
          <div class="status-dot" id="statusDot"></div>
          <div class="status-text" id="statusText">待機中</div>
        </div>
        <div class="counter-label" id="counterLabel">本日の稼ぎ</div>
        <div class="counter-amount" id="counterAmount">
          <span class="unit">¥</span><span class="number" id="counterNumber">0</span>
        </div>
        <div class="counter-meta">
          <div class="counter-meta-item">
            <div class="counter-meta-label">経過</div>
            <div class="counter-meta-value" id="counterElapsed">00:00:00</div>
          </div>
          <div class="counter-meta-item">
            <div class="counter-meta-label">秒給</div>
            <div class="counter-meta-value" id="counterPerSec">¥0</div>
          </div>
        </div>
        <div class="counter-trivia" id="counterTrivia">
          <span id="triviaText"></span>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn" class="btn btn-primary">勤務開始</button>
        <button id="endBtn" class="btn btn-outline" hidden>勤務終了</button>
      </div>

      <div class="history">
        <div class="history-header">
          <div class="history-title">履歴</div>
          <div class="history-total" id="historyTotal"></div>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-grab"></div>
      <div class="modal-header">
        <div class="modal-title">設定</div>
        <button type="button" id="settingsCancel" class="text-btn">閉じる</button>
      </div>
      <form class="setup-form" id="settingsForm">
        <div class="field">
          <div class="field-row">
            <label for="settingsSalary">月給</label>
            <div class="field-input">
              <input id="settingsSalary" type="number" inputmode="numeric" min="1" required>
              <span class="field-unit">円</span>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="settingsDays">月の稼働日数</label>
            <div class="field-input">
              <input id="settingsDays" type="number" inputmode="numeric" min="1" max="31" required>
              <span class="field-unit">日</span>
            </div>
          </div>
        </div>
        <div class="modal-rate" id="settingsRate"></div>
        <button type="submit" class="btn btn-primary modal-submit">保存</button>
      </form>
    </div>
  </div>

  <script>
    // ===== Storage =====
    const STORAGE = {
      SETTINGS: 'work-motivation:settings',
      ACTIVE: 'work-motivation:active',
      HISTORY: 'work-motivation:history',
    };

    const loadJSON = (key, fallback) => {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    };
    const saveJSON = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    const clearKey = (key) => localStorage.removeItem(key);

    // ===== Domain =====
    const HOURS_PER_DAY = 8;
    const perSecond = (s) => s.monthlySalary / (s.workDays * HOURS_PER_DAY * 3600);
    const fmtInt = (n) => Math.floor(n).toLocaleString('ja-JP');
    const fmtYen = (n) => '¥' + fmtInt(n);
    const fmtPerSec = (rate) => '¥' + (rate >= 1 ? fmtInt(rate) : rate.toFixed(2));
    const fmtDuration = (sec) => {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      const pad = (v) => v.toString().padStart(2, '0');
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    };
    const fmtDate = (ts) => {
      const d = new Date(ts);
      const mm = (d.getMonth() + 1).toString().padStart(2, '0');
      const dd = d.getDate().toString().padStart(2, '0');
      return `${mm}.${dd}`;
    };
    const fmtToday = () => {
      const d = new Date();
      const y = d.getFullYear();
      const mm = (d.getMonth() + 1).toString().padStart(2, '0');
      const dd = d.getDate().toString().padStart(2, '0');
      return `${y}.${mm}.${dd}`;
    };
    const fmtDurationLoose = (sec) => {
      sec = Math.max(1, Math.floor(sec));
      if (sec < 60) return `${sec}秒`;
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (m < 60) return s > 0 ? `${m}分${s}秒` : `${m}分`;
      const h = Math.floor(m / 60);
      const mm2 = m % 60;
      return mm2 > 0 ? `${h}時間${mm2}分` : `${h}時間`;
    };
    const jpNum = (n) => Math.round(n).toLocaleString('ja-JP');
    const jpNum1 = (n) => {
      const v = Math.round(n * 10) / 10;
      return v.toLocaleString('ja-JP', { maximumFractionDigits: 1 });
    };

    // ===== Trivia Data =====
    // 1秒あたりのざっくり推定値。数字は概算で、読み物として楽しめる桁感を優先。
    const WORLD_FACTS = [
      // 生命
      (s) => `新生児が <span class="num">${jpNum(4.3 * s)}人</span> この世に生まれた`,
      (s) => `<span class="num">${jpNum(1.8 * s)}人</span> が 息を引き取った`,
      (s) => `心臓が <span class="num">${jpNum(1.1 * s)}回</span> 鼓動した`,
      (s) => `世界で <span class="num">${jpNum(45 / 60 * s)}組</span> の夫婦が誕生した`,
      (s) => `世界の蚊が <span class="num">${jpNum(800000 * s)}人</span> を刺した`,
      (s) => `世界で <span class="num">${jpNum(180000 * s)}本</span> タバコが吸われた`,

      // 天体・物理
      (s) => `地球が太陽の周りを <span class="num">${jpNum(30 * s)}km</span> 進んだ`,
      (s) => `太陽から <span class="num">${jpNum(400 * s)}万トン</span> の質量が失われた`,
      (s) => `地球が自転で赤道上 <span class="num">${jpNum(465 * s)}m</span> 回った`,
      (s) => `宇宙は <span class="num">${jpNum(70 * s)}km/s/Mpc</span> のペースで膨張し続けた`,

      // ネット・テック
      (s) => `Google検索が <span class="num">${jpNum(100000 * s)}回</span> 実行された`,
      (s) => `X（旧Twitter）に <span class="num">${jpNum(6000 * s)}件</span> 投稿された`,
      (s) => `YouTubeに <span class="num">${jpNum1(8.33 * s)}時間分</span> の動画がアップされた`,
      (s) => `Netflixが <span class="num">${jpNum1(3400 * s)}時間</span> 視聴された`,
      (s) => `世界で <span class="num">${jpNum(2800000 * s)}通</span> メールが送信された`,
      (s) => `Discordに <span class="num">${jpNum(11574 * s)}件</span> のメッセージが送られた`,
      (s) => `Wikipediaが <span class="num">${jpNum(2 * s)}回</span> 編集された`,
      (s) => `Instagramに <span class="num">${jpNum(1000 * s)}件</span> 写真が投稿された`,
      (s) => `TikTokが <span class="num">${jpNum(37 * s)}回</span> ダウンロードされた`,

      // 経済・消費
      (s) => `ビル・ゲイツの資産が 約<span class="num">${jpNum(300 * s)}ドル</span> 増えた`,
      (s) => `イーロン・マスクの資産が 約<span class="num">${jpNum(3000 * s)}ドル</span> 増えた`,
      (s) => `マクドナルドで <span class="num">${jpNum(75 * s)}個</span> バーガーが売れた`,
      (s) => `Amazonが <span class="num">${jpNum(460 * s)}個</span> 荷物を配達した`,
      (s) => `Amazonが 約<span class="num">${jpNum(4700 * s)}ドル</span> 売り上げた`,
      (s) => `世界で <span class="num">${jpNum(22000 * s)}本</span> コカ・コーラが開けられた`,
      (s) => `<span class="num">${jpNum1(7.5 * s)}台</span> iPhoneが販売された`,
      (s) => `<span class="num">${jpNum1(2.6 * s)}台</span> の自動車が生産された`,
      (s) => `世界で <span class="num">${jpNum1(350 * s)}枚</span> ピザが焼けた`,
      (s) => `世界で <span class="num">${jpNum(250 * s)}kg</span> チョコレートが消費された`,
      (s) => `世界の鉛筆工場から <span class="num">${jpNum(450 * s)}本</span> 鉛筆が出荷された`,

      // 地球環境
      (s) => `世界の空港に <span class="num">${jpNum(s)}機</span> 飛行機が着陸した`,
      (s) => `世界で <span class="num">${jpNum(1270 * s)}kg</span> の CO₂ が排出された`,
      (s) => `世界の森林が <span class="num">${jpNum1(1.3 * s)}ヘクタール</span> 失われた`,
      (s) => `海に <span class="num">${jpNum(8 * s)}kg</span> のプラスチックが流れ込んだ`,
      (s) => `世界で <span class="num">${jpNum(12600 * s)}kg</span> の紙が消費された`,
      (s) => `世界で <span class="num">${jpNum(25000 * s)}kWh</span> の電力が使われた`,
      (s) => `世界で <span class="num">${jpNum(6000 * s)}ℓ</span> のビールが醸造された`,

      // 日本ローカル
      (s) => `日本のコンビニで <span class="num">${jpNum(55 * s)}個</span> おにぎりが売れた`,
      (s) => `日本でビールが <span class="num">${jpNum(180 * s)}本</span> 開けられた`,
      (s) => `日本のタクシーが 延べ <span class="num">${jpNum(30 * s)}台</span> 乗車された`,
      (s) => `日本のコンビニに <span class="num">${jpNum(115 * s)}人</span> の客が入った`,
      (s) => `日本で <span class="num">${jpNum(143 * s)}パック</span> 納豆が食べられた`,
      (s) => `日本郵便が <span class="num">${jpNum(347 * s)}通</span> 配達した`,
      (s) => `東京の電車が 延べ <span class="num">${jpNum(13 * s)}人</span> を運んだ`,

      // ちょっと遊び
      (s) => `世界の電子レンジが <span class="num">${jpNum(11574 * s)}回</span>「チン」と鳴った`,
      (s) => `人類の体毛合計が <span class="num">${jpNum(80 * s)}m</span> 伸びた`,
      (s) => `世界で <span class="num">${jpNum(30000 * s)}回</span> Tinderの右スワイプが発生した`,
    ];

    const ERAS = [
      // 江戸以前
      { era: '戦国時代', job: '足軽（年俸米10石）', monthlyYen: 42000 },
      { era: '江戸中期', job: '大工', monthlyYen: 125000 },
      { era: '江戸中期', job: '長屋暮らしの町人', monthlyYen: 40000 },
      // 明治
      { era: '明治10年', job: '小学校教師', monthlyYen: 10 },
      { era: '明治15年', job: '巡査', monthlyYen: 6 },
      { era: '明治23年', job: '福沢諭吉（慶應義塾）', monthlyYen: 100 },
      { era: '明治25年', job: '新聞記者', monthlyYen: 25 },
      { era: '明治40年', job: '夏目漱石の朝日新聞社員', monthlyYen: 200 },
      // 大正
      { era: '大正元年', job: '銀行員', monthlyYen: 50 },
      { era: '大正3年', job: '電話交換手', monthlyYen: 25 },
      { era: '大正10年', job: '中学校教員', monthlyYen: 45 },
      { era: '大正14年', job: '総理大臣', monthlyYen: 800 },
      // 昭和
      { era: '昭和5年', job: '国家公務員（大卒初任給）', monthlyYen: 75 },
      { era: '昭和10年', job: '鉄道員', monthlyYen: 70 },
      { era: '昭和20年', job: '教員（戦後）', monthlyYen: 200 },
      { era: '昭和25年', job: '大卒初任給', monthlyYen: 3000 },
      { era: '昭和30年', job: '大卒初任給', monthlyYen: 5600 },
      { era: '昭和35年', job: '大卒初任給', monthlyYen: 13467 },
      { era: '昭和40年', job: '大卒初任給', monthlyYen: 19610 },
      { era: '昭和45年', job: '大卒初任給', monthlyYen: 39900 },
      { era: '昭和50年', job: '大卒初任給', monthlyYen: 89300 },
      { era: '昭和55年', job: '大卒初任給', monthlyYen: 121800 },
      { era: '昭和60年', job: '大卒初任給', monthlyYen: 140000 },
      // 平成
      { era: '平成元年', job: '大卒初任給', monthlyYen: 160900 },
      { era: '平成10年', job: '大卒初任給', monthlyYen: 195500 },
      { era: '平成20年', job: '大卒初任給', monthlyYen: 201300 },
      // 令和
      { era: '令和6年', job: '大卒初任給', monthlyYen: 237300 },
    ];

    function renderTriviaLine(elapsedSec, earned) {
      if (elapsedSec < 1) return '';
      if (triviaMode === 'world') {
        const fact = WORLD_FACTS[triviaWorldIdx];
        return `<span class="kind">WORLD</span>この${fmtDurationLoose(elapsedSec)}で、世界では ${fact(elapsedSec)}`;
      } else {
        const era = ERAS[triviaEraIdx];
        const months = earned / era.monthlyYen;
        let display;
        if (months >= 1200)       display = `<span class="num">${(months / 12).toFixed(0)}年</span>`;
        else if (months >= 12)    display = `<span class="num">${(months / 12).toFixed(1)}年</span>`;
        else if (months >= 1)     display = `<span class="num">${months.toFixed(1)}ヶ月</span>`;
        else if (months >= 1/30)  display = `<span class="num">${(months * 30).toFixed(1)}日</span>`;
        else                      display = `<span class="num">${(months * 30 * 8).toFixed(2)}時間</span>`;
        return `<span class="kind">ERA</span><span class="num">${fmtYen(earned)}</span> は ${era.era}の${era.job} ${display}ぶんの月給`;
      }
    }

    // ===== Elements =====
    const el = {
      brandDate: document.getElementById('brandDate'),
      setupView: document.getElementById('setupView'),
      setupForm: document.getElementById('setupForm'),
      setupSalary: document.getElementById('setupSalary'),
      setupDays: document.getElementById('setupDays'),
      mainView: document.getElementById('mainView'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      counterLabel: document.getElementById('counterLabel'),
      counterNumber: document.getElementById('counterNumber'),
      counterElapsed: document.getElementById('counterElapsed'),
      counterPerSec: document.getElementById('counterPerSec'),
      counterTrivia: document.getElementById('counterTrivia'),
      triviaText: document.getElementById('triviaText'),
      startBtn: document.getElementById('startBtn'),
      endBtn: document.getElementById('endBtn'),
      settingsBtn: document.getElementById('settingsBtn'),
      historyList: document.getElementById('historyList'),
      historyTotal: document.getElementById('historyTotal'),
      settingsModal: document.getElementById('settingsModal'),
      settingsForm: document.getElementById('settingsForm'),
      settingsSalary: document.getElementById('settingsSalary'),
      settingsDays: document.getElementById('settingsDays'),
      settingsRate: document.getElementById('settingsRate'),
      settingsCancel: document.getElementById('settingsCancel'),
    };

    // ===== State =====
    let tickTimer = null;
    let triviaTimer = null;
    let triviaMode = 'world';
    let triviaWorldIdx = 0;
    let triviaEraIdx = 0;

    function pickRandomIdx(len, prev) {
      if (len <= 1) return 0;
      let i;
      do { i = Math.floor(Math.random() * len); } while (i === prev);
      return i;
    }

    // ===== Rendering =====
    function showSetup() {
      el.setupView.hidden = false;
      el.mainView.hidden = true;
      el.settingsBtn.hidden = true;
      setTimeout(() => el.setupSalary.focus(), 100);
    }

    function showMain() {
      el.setupView.hidden = true;
      el.mainView.hidden = false;
      el.settingsBtn.hidden = false;
    }

    function renderCounter() {
      const settings = loadJSON(STORAGE.SETTINGS, null);
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (!settings) return;

      const rate = perSecond(settings);
      el.counterPerSec.textContent = fmtPerSec(rate);

      if (active) {
        const elapsedSec = (Date.now() - active.startedAt) / 1000;
        const earned = elapsedSec * rate;
        el.counterNumber.textContent = fmtInt(earned);
        el.counterElapsed.textContent = fmtDuration(elapsedSec);
        el.statusDot.classList.add('active');
        el.statusText.classList.add('active');
        el.statusText.textContent = '稼働中';
        el.counterLabel.textContent = '本日の稼ぎ';
        el.startBtn.hidden = true;
        el.endBtn.hidden = false;
        el.triviaText.innerHTML = renderTriviaLine(elapsedSec, earned);
      } else {
        el.counterNumber.textContent = '0';
        el.counterElapsed.textContent = '00:00:00';
        el.statusDot.classList.remove('active');
        el.statusText.classList.remove('active');
        el.statusText.textContent = '待機中';
        el.counterLabel.textContent = '本日の稼ぎ';
        el.startBtn.hidden = false;
        el.endBtn.hidden = true;
        el.triviaText.innerHTML = '';
      }
    }

    function rotateTrivia() {
      triviaMode = triviaMode === 'world' ? 'era' : 'world';
      if (triviaMode === 'world') triviaWorldIdx = pickRandomIdx(WORLD_FACTS.length, triviaWorldIdx);
      else triviaEraIdx = pickRandomIdx(ERAS.length, triviaEraIdx);
      el.counterTrivia.classList.add('fade');
      setTimeout(() => {
        renderCounter();
        el.counterTrivia.classList.remove('fade');
      }, 260);
    }

    function startTriviaTimer() {
      stopTriviaTimer();
      // Kick off with a random starting mode + freshly picked items
      triviaMode = Math.random() < 0.5 ? 'world' : 'era';
      triviaWorldIdx = pickRandomIdx(WORLD_FACTS.length, -1);
      triviaEraIdx = pickRandomIdx(ERAS.length, -1);
      triviaTimer = setInterval(rotateTrivia, 6500);
    }
    function stopTriviaTimer() {
      if (triviaTimer) { clearInterval(triviaTimer); triviaTimer = null; }
    }

    function startTick() {
      stopTick();
      startTriviaTimer();
      renderCounter();
      tickTimer = setInterval(renderCounter, 1000);
    }
    function stopTick() {
      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
      stopTriviaTimer();
    }

    function renderHistory() {
      const history = loadJSON(STORAGE.HISTORY, []);
      el.historyList.innerHTML = '';
      if (!history.length) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'まだ記録はありません。';
        el.historyList.appendChild(empty);
        el.historyTotal.textContent = '';
        return;
      }
      const sorted = [...history].sort((a, b) => b.startedAt - a.startedAt);
      const total = sorted.reduce((acc, h) => acc + h.amount, 0);
      el.historyTotal.textContent = '累計 ' + fmtYen(total);

      sorted.forEach((h) => {
        const row = document.createElement('div');
        row.className = 'history-item';
        const date = document.createElement('div');
        date.className = 'history-date';
        date.textContent = fmtDate(h.startedAt);
        const dur = document.createElement('div');
        dur.className = 'history-duration';
        dur.textContent = fmtDuration(h.seconds);
        const amount = document.createElement('div');
        amount.className = 'history-amount';
        amount.textContent = fmtYen(h.amount);
        const del = document.createElement('button');
        del.className = 'history-delete';
        del.textContent = '×';
        del.setAttribute('aria-label', '削除');
        del.addEventListener('click', () => {
          if (!confirm('この記録を削除しますか？')) return;
          const list = loadJSON(STORAGE.HISTORY, []).filter((x) => x.id !== h.id);
          saveJSON(STORAGE.HISTORY, list);
          renderHistory();
        });
        row.append(date, dur, amount, del);
        el.historyList.appendChild(row);
      });
    }

    // ===== Actions =====
    function startWork() {
      const active = { startedAt: Date.now() };
      saveJSON(STORAGE.ACTIVE, active);
      startTick();
    }

    function endWork() {
      const settings = loadJSON(STORAGE.SETTINGS, null);
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (!settings || !active) return;
      const endedAt = Date.now();
      const seconds = (endedAt - active.startedAt) / 1000;
      const amount = Math.floor(seconds * perSecond(settings));
      if (seconds < 1) {
        if (!confirm('1秒未満ですが終了しますか？（記録は残りません）')) return;
        clearKey(STORAGE.ACTIVE);
        stopTick();
        renderCounter();
        return;
      }
      const entry = {
        id: `${active.startedAt}-${endedAt}`,
        startedAt: active.startedAt,
        endedAt,
        seconds,
        amount,
      };
      const history = loadJSON(STORAGE.HISTORY, []);
      history.push(entry);
      saveJSON(STORAGE.HISTORY, history);
      clearKey(STORAGE.ACTIVE);
      stopTick();
      renderCounter();
      renderHistory();
    }

    function openSettings() {
      const s = loadJSON(STORAGE.SETTINGS, { monthlySalary: 0, workDays: 0 });
      el.settingsSalary.value = s.monthlySalary;
      el.settingsDays.value = s.workDays;
      updateSettingsRate();
      el.settingsModal.classList.add('open');
    }
    function closeSettings() {
      el.settingsModal.classList.remove('open');
    }
    function updateSettingsRate() {
      const salary = Number(el.settingsSalary.value);
      const days = Number(el.settingsDays.value);
      if (salary > 0 && days > 0) {
        const rate = salary / (days * HOURS_PER_DAY * 3600);
        const hourly = salary / (days * HOURS_PER_DAY);
        el.settingsRate.innerHTML = `
          <span>時給 <strong>${fmtYen(hourly)}</strong></span>
          <span>秒給 <strong>${fmtPerSec(rate)}</strong></span>
        `;
      } else {
        el.settingsRate.innerHTML = '';
      }
    }

    // ===== Event wiring =====
    el.setupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const monthlySalary = Number(el.setupSalary.value);
      const workDays = Number(el.setupDays.value);
      if (!(monthlySalary > 0) || !(workDays > 0)) return;
      saveJSON(STORAGE.SETTINGS, { monthlySalary, workDays });
      showMain();
      renderCounter();
      renderHistory();
    });

    el.startBtn.addEventListener('click', startWork);
    el.endBtn.addEventListener('click', endWork);
    el.settingsBtn.addEventListener('click', openSettings);
    el.settingsCancel.addEventListener('click', closeSettings);
    el.settingsModal.addEventListener('click', (e) => {
      if (e.target === el.settingsModal) closeSettings();
    });
    el.settingsSalary.addEventListener('input', updateSettingsRate);
    el.settingsDays.addEventListener('input', updateSettingsRate);
    el.settingsForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const monthlySalary = Number(el.settingsSalary.value);
      const workDays = Number(el.settingsDays.value);
      if (!(monthlySalary > 0) || !(workDays > 0)) return;
      saveJSON(STORAGE.SETTINGS, { monthlySalary, workDays });
      closeSettings();
      renderCounter();
    });

    // Pause tick when tab hidden to save battery; resume on visible.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopTick();
      } else {
        const active = loadJSON(STORAGE.ACTIVE, null);
        if (active) startTick();
        else renderCounter();
      }
    });

    // ===== Boot =====
    (function init() {
      el.brandDate.textContent = fmtToday();
      const settings = loadJSON(STORAGE.SETTINGS, null);
      if (!settings) {
        showSetup();
        return;
      }
      showMain();
      renderHistory();
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (active) startTick();
      else renderCounter();
    })();
  </script>
</body>
</html>
