<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="稼ぎカウンター">
  <meta name="theme-color" content="#fafaf8">
  <title>稼ぎカウンター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf7;
      --line: #e5e2db;
      --line-strong: #15161a;
      --text: #15161a;
      --text-dim: #6b6e74;
      --text-quiet: #a5a7ae;
      --accent: #1f5a3a;
      --accent-soft: #e8efe8;
      --danger: #9b3c3c;
      --danger-soft: #f2e5e5;
      --font-sans: 'Inter Tight', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-ja: 'Noto Sans JP', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans), var(--font-ja);
      font-feature-settings: "ss01" on, "cv11" on;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    main {
      max-width: 460px;
      margin: 0 auto;
      padding: 24px 22px 48px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 28px;
    }
    .brand {
      font-family: var(--font-ja);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .brand-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-quiet);
      letter-spacing: 0.04em;
    }
    .text-btn {
      background: none;
      border: none;
      padding: 4px 0;
      font-family: var(--font-ja);
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .text-btn:active { color: var(--text); }

    /* ===== Labels ===== */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-quiet);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ===== Setup View ===== */
    #setupView {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-top: 40px;
    }
    .setup-intro {
      font-family: var(--font-ja);
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .field:first-of-type { border-top: 1px solid var(--line); }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .field label {
      font-family: var(--font-ja);
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .field input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      padding: 0;
      outline: none;
      text-align: right;
      width: 120px;
      -webkit-appearance: none;
      font-variant-numeric: tabular-nums;
    }
    .field input::placeholder {
      color: var(--text-quiet);
    }
    .field .hint {
      font-family: var(--font-ja);
      font-size: 11px;
      color: var(--text-quiet);
    }

    /* ===== Main View ===== */
    #mainView {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ===== Counter Block ===== */
    .counter {
      padding: 8px 0 28px;
    }
    .counter-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-quiet);
    }
    .status-dot.active {
      background: var(--accent);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      font-family: var(--font-ja);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }
    .status-text.active {
      color: var(--accent);
    }

    .counter-amount {
      font-family: var(--font-mono);
      font-size: clamp(52px, 14.5vw, 84px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" on, "zero" on;
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin: 6px 0 18px;
    }
    .counter-amount .unit {
      font-size: 0.4em;
      font-weight: 500;
      color: var(--text-quiet);
      letter-spacing: 0;
    }
    .counter-amount.active .number {
      transition: opacity 0.08s ease-out;
    }
    .counter-amount.flash .number {
      opacity: 0.7;
    }

    .counter-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .counter-meta-item {
      padding: 14px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .counter-meta-item + .counter-meta-item {
      border-left: 1px solid var(--line);
      padding-left: 16px;
    }
    .counter-meta-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-quiet);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .counter-meta-value {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* ===== Buttons ===== */
    .actions {
      margin-top: 24px;
    }
    .btn {
      width: 100%;
      font-family: var(--font-ja);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 16px 20px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #184a2f; }
    .btn-danger {
      background: var(--bg);
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger-soft); }
    .btn-ghost {
      background: var(--bg);
      color: var(--text);
      border-color: var(--line-strong);
    }
    .btn-link {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-ja);
      font-size: 12px;
      padding: 8px;
      cursor: pointer;
    }

    /* ===== History ===== */
    .history {
      margin-top: 44px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .history-title {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-quiet);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .history-total {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--line);
      margin-top: 10px;
    }
    .history-item {
      display: grid;
      grid-template-columns: 44px 1fr auto 28px;
      gap: 12px;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .history-date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .history-duration {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-quiet);
      font-variant-numeric: tabular-nums;
    }
    .history-amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .history-empty {
      padding: 22px 0;
      text-align: left;
      color: var(--text-quiet);
      font-family: var(--font-ja);
      font-size: 12px;
      border-bottom: 1px solid var(--line);
    }
    .history-delete {
      background: none;
      border: none;
      color: var(--text-quiet);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s;
      justify-self: end;
    }
    .history-delete:active { opacity: 1; color: var(--danger); }

    /* ===== Modal ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 20, 0.18);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 10;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      border-top: 1px solid var(--line-strong);
      border-radius: 14px 14px 0 0;
      padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title {
      font-family: var(--font-ja);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .modal-rate {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      padding: 10px 0 2px;
      display: flex;
      justify-content: space-between;
      font-variant-numeric: tabular-nums;
    }
    .modal-rate strong {
      color: var(--text);
      font-weight: 500;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .modal-actions .btn { flex: 1; }

    /* ===== Utilities ===== */
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main>
    <header class="header">
      <div>
        <div class="brand">稼ぎカウンター</div>
        <div class="brand-date" id="brandDate"></div>
      </div>
      <button id="settingsBtn" class="text-btn" hidden aria-label="設定を開く">設定</button>
    </header>

    <!-- Setup View -->
    <section id="setupView" hidden>
      <div>
        <div class="eyebrow">初回設定</div>
        <p class="setup-intro" style="margin-top:14px">月給と稼働日数を入れると、秒給を自動計算します。<br>あとで変更できます。</p>
      </div>

      <form class="setup-form" id="setupForm">
        <div class="field">
          <div class="field-row">
            <label for="setupSalary">月給</label>
            <div style="display:flex; align-items:center; gap:6px">
              <input id="setupSalary" type="number" inputmode="numeric" placeholder="300000" min="1" required>
              <span class="hint" style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim)">円</span>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="setupDays">月の稼働日数</label>
            <div style="display:flex; align-items:center; gap:6px">
              <input id="setupDays" type="number" inputmode="numeric" placeholder="20" min="1" max="31" required>
              <span class="hint" style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim)">日</span>
            </div>
          </div>
          <div class="hint">1日8時間勤務として計算</div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:8px">はじめる</button>
      </form>
    </section>

    <!-- Main View -->
    <section id="mainView" hidden>
      <div class="counter">
        <div class="counter-status">
          <div class="status-dot" id="statusDot"></div>
          <div class="status-text" id="statusText">待機中</div>
        </div>
        <div class="counter-amount" id="counterAmount">
          <span class="unit">¥</span><span class="number" id="counterNumber">0</span>
        </div>
        <div class="counter-meta">
          <div class="counter-meta-item">
            <div class="counter-meta-label">Elapsed</div>
            <div class="counter-meta-value" id="counterElapsed">00:00:00</div>
          </div>
          <div class="counter-meta-item">
            <div class="counter-meta-label">Per second</div>
            <div class="counter-meta-value" id="counterPerSec">¥0</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn" class="btn btn-primary">勤務開始</button>
        <button id="endBtn" class="btn btn-danger" hidden>勤務終了</button>
      </div>

      <div class="history">
        <div class="history-header">
          <div class="history-title">History</div>
          <div class="history-total" id="historyTotal"></div>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">設定</div>
        <button type="button" id="settingsCancel" class="text-btn">閉じる</button>
      </div>
      <form class="setup-form" id="settingsForm" style="display:flex; flex-direction:column; gap:0">
        <div class="field">
          <div class="field-row">
            <label for="settingsSalary">月給</label>
            <div style="display:flex; align-items:center; gap:6px">
              <input id="settingsSalary" type="number" inputmode="numeric" min="1" required>
              <span style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim)">円</span>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-row">
            <label for="settingsDays">月の稼働日数</label>
            <div style="display:flex; align-items:center; gap:6px">
              <input id="settingsDays" type="number" inputmode="numeric" min="1" max="31" required>
              <span style="font-family:var(--font-mono); font-size:12px; color:var(--text-dim)">日</span>
            </div>
          </div>
        </div>
        <div class="modal-rate" id="settingsRate"></div>
        <button type="submit" class="btn btn-primary" style="margin-top:12px">保存</button>
      </form>
    </div>
  </div>

  <script>
    // ===== Storage =====
    const STORAGE = {
      SETTINGS: 'work-motivation:settings',
      ACTIVE: 'work-motivation:active',
      HISTORY: 'work-motivation:history',
    };

    const loadJSON = (key, fallback) => {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    };
    const saveJSON = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    const clearKey = (key) => localStorage.removeItem(key);

    // ===== Domain =====
    const HOURS_PER_DAY = 8;
    const perSecond = (s) => s.monthlySalary / (s.workDays * HOURS_PER_DAY * 3600);
    const fmtYen = (n) => Math.floor(n).toLocaleString('ja-JP');
    const fmtYenUnit = (n) => '¥' + fmtYen(n);
    const fmtDuration = (sec) => {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      const pad = (v) => v.toString().padStart(2, '0');
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    };
    const fmtDate = (ts) => {
      const d = new Date(ts);
      const mm = (d.getMonth() + 1).toString().padStart(2, '0');
      const dd = d.getDate().toString().padStart(2, '0');
      return `${mm}.${dd}`;
    };
    const fmtToday = () => {
      const d = new Date();
      const y = d.getFullYear();
      const mm = (d.getMonth() + 1).toString().padStart(2, '0');
      const dd = d.getDate().toString().padStart(2, '0');
      return `${y}.${mm}.${dd}`;
    };

    // ===== Elements =====
    const el = {
      brandDate: document.getElementById('brandDate'),
      setupView: document.getElementById('setupView'),
      setupForm: document.getElementById('setupForm'),
      setupSalary: document.getElementById('setupSalary'),
      setupDays: document.getElementById('setupDays'),
      mainView: document.getElementById('mainView'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      counterAmount: document.getElementById('counterAmount'),
      counterNumber: document.getElementById('counterNumber'),
      counterElapsed: document.getElementById('counterElapsed'),
      counterPerSec: document.getElementById('counterPerSec'),
      startBtn: document.getElementById('startBtn'),
      endBtn: document.getElementById('endBtn'),
      settingsBtn: document.getElementById('settingsBtn'),
      historyList: document.getElementById('historyList'),
      historyTotal: document.getElementById('historyTotal'),
      settingsModal: document.getElementById('settingsModal'),
      settingsForm: document.getElementById('settingsForm'),
      settingsSalary: document.getElementById('settingsSalary'),
      settingsDays: document.getElementById('settingsDays'),
      settingsRate: document.getElementById('settingsRate'),
      settingsCancel: document.getElementById('settingsCancel'),
    };

    // ===== State =====
    let tickTimer = null;

    // ===== Rendering =====
    function showSetup() {
      el.setupView.hidden = false;
      el.mainView.hidden = true;
      el.settingsBtn.hidden = true;
      setTimeout(() => el.setupSalary.focus(), 100);
    }

    function showMain() {
      el.setupView.hidden = true;
      el.mainView.hidden = false;
      el.settingsBtn.hidden = false;
    }

    function renderCounter() {
      const settings = loadJSON(STORAGE.SETTINGS, null);
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (!settings) return;

      const rate = perSecond(settings);
      el.counterPerSec.textContent = '¥' + (rate >= 1 ? fmtYen(rate) : rate.toFixed(2));

      if (active) {
        const elapsedSec = (Date.now() - active.startedAt) / 1000;
        const earned = elapsedSec * rate;
        el.counterNumber.textContent = fmtYen(earned);
        el.counterAmount.classList.add('active');
        // subtle flash for perceived motion
        el.counterAmount.classList.remove('flash');
        void el.counterAmount.offsetWidth;
        el.counterAmount.classList.add('flash');
        setTimeout(() => el.counterAmount.classList.remove('flash'), 90);
        el.counterElapsed.textContent = fmtDuration(elapsedSec);
        el.statusDot.classList.add('active');
        el.statusText.classList.add('active');
        el.statusText.textContent = '稼働中';
        el.startBtn.hidden = true;
        el.endBtn.hidden = false;
      } else {
        el.counterNumber.textContent = '0';
        el.counterAmount.classList.remove('active', 'flash');
        el.counterElapsed.textContent = '00:00:00';
        el.statusDot.classList.remove('active');
        el.statusText.classList.remove('active');
        el.statusText.textContent = '待機中';
        el.startBtn.hidden = false;
        el.endBtn.hidden = true;
      }
    }

    function startTick() {
      stopTick();
      renderCounter();
      tickTimer = setInterval(renderCounter, 1000);
    }
    function stopTick() {
      if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
    }

    function renderHistory() {
      const history = loadJSON(STORAGE.HISTORY, []);
      el.historyList.innerHTML = '';
      if (!history.length) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'まだ記録はありません。';
        el.historyList.appendChild(empty);
        el.historyTotal.textContent = '';
        return;
      }
      const sorted = [...history].sort((a, b) => b.startedAt - a.startedAt);
      const total = sorted.reduce((acc, h) => acc + h.amount, 0);
      el.historyTotal.textContent = '累計 ' + fmtYenUnit(total);

      sorted.forEach((h) => {
        const row = document.createElement('div');
        row.className = 'history-item';
        const date = document.createElement('div');
        date.className = 'history-date';
        date.textContent = fmtDate(h.startedAt);
        const dur = document.createElement('div');
        dur.className = 'history-duration';
        dur.textContent = fmtDuration(h.seconds);
        const amount = document.createElement('div');
        amount.className = 'history-amount';
        amount.textContent = fmtYenUnit(h.amount);
        const del = document.createElement('button');
        del.className = 'history-delete';
        del.textContent = '×';
        del.setAttribute('aria-label', '削除');
        del.addEventListener('click', () => {
          if (!confirm('この記録を削除しますか？')) return;
          const list = loadJSON(STORAGE.HISTORY, []).filter((x) => x.id !== h.id);
          saveJSON(STORAGE.HISTORY, list);
          renderHistory();
        });
        row.append(date, dur, amount, del);
        el.historyList.appendChild(row);
      });
    }

    // ===== Actions =====
    function startWork() {
      const active = { startedAt: Date.now() };
      saveJSON(STORAGE.ACTIVE, active);
      startTick();
    }

    function endWork() {
      const settings = loadJSON(STORAGE.SETTINGS, null);
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (!settings || !active) return;
      const endedAt = Date.now();
      const seconds = (endedAt - active.startedAt) / 1000;
      const amount = Math.floor(seconds * perSecond(settings));
      if (seconds < 1) {
        if (!confirm('1秒未満ですが終了しますか？（記録は残りません）')) return;
        clearKey(STORAGE.ACTIVE);
        stopTick();
        renderCounter();
        return;
      }
      const entry = {
        id: `${active.startedAt}-${endedAt}`,
        startedAt: active.startedAt,
        endedAt,
        seconds,
        amount,
      };
      const history = loadJSON(STORAGE.HISTORY, []);
      history.push(entry);
      saveJSON(STORAGE.HISTORY, history);
      clearKey(STORAGE.ACTIVE);
      stopTick();
      renderCounter();
      renderHistory();
    }

    function openSettings() {
      const s = loadJSON(STORAGE.SETTINGS, { monthlySalary: 0, workDays: 0 });
      el.settingsSalary.value = s.monthlySalary;
      el.settingsDays.value = s.workDays;
      updateSettingsRate();
      el.settingsModal.classList.add('open');
    }
    function closeSettings() {
      el.settingsModal.classList.remove('open');
    }
    function updateSettingsRate() {
      const salary = Number(el.settingsSalary.value);
      const days = Number(el.settingsDays.value);
      if (salary > 0 && days > 0) {
        const rate = salary / (days * HOURS_PER_DAY * 3600);
        const hourly = salary / (days * HOURS_PER_DAY);
        el.settingsRate.innerHTML = `
          <span>時給 <strong>${fmtYenUnit(hourly)}</strong></span>
          <span>秒給 <strong>¥${rate >= 1 ? fmtYen(rate) : rate.toFixed(2)}</strong></span>
        `;
      } else {
        el.settingsRate.innerHTML = '';
      }
    }

    // ===== Event wiring =====
    el.setupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const monthlySalary = Number(el.setupSalary.value);
      const workDays = Number(el.setupDays.value);
      if (!(monthlySalary > 0) || !(workDays > 0)) return;
      saveJSON(STORAGE.SETTINGS, { monthlySalary, workDays });
      showMain();
      renderCounter();
      renderHistory();
    });

    el.startBtn.addEventListener('click', startWork);
    el.endBtn.addEventListener('click', endWork);
    el.settingsBtn.addEventListener('click', openSettings);
    el.settingsCancel.addEventListener('click', closeSettings);
    el.settingsModal.addEventListener('click', (e) => {
      if (e.target === el.settingsModal) closeSettings();
    });
    el.settingsSalary.addEventListener('input', updateSettingsRate);
    el.settingsDays.addEventListener('input', updateSettingsRate);
    el.settingsForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const monthlySalary = Number(el.settingsSalary.value);
      const workDays = Number(el.settingsDays.value);
      if (!(monthlySalary > 0) || !(workDays > 0)) return;
      saveJSON(STORAGE.SETTINGS, { monthlySalary, workDays });
      closeSettings();
      renderCounter();
    });

    // Pause tick when tab hidden to save battery; resume on visible.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopTick();
      } else {
        const active = loadJSON(STORAGE.ACTIVE, null);
        if (active) startTick();
        else renderCounter();
      }
    });

    // ===== Boot =====
    (function init() {
      el.brandDate.textContent = fmtToday();
      const settings = loadJSON(STORAGE.SETTINGS, null);
      if (!settings) {
        showSetup();
        return;
      }
      showMain();
      renderHistory();
      const active = loadJSON(STORAGE.ACTIVE, null);
      if (active) startTick();
      else renderCounter();
    })();
  </script>
</body>
</html>
